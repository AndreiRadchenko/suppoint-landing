<!DOCTYPE html>
<html lang="en">
  <head>
    {{> head pageTitle="Contact"}}
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body class="min-h-screen flex flex-col bg-gray-50 text-gray-900">

    {{> nav}}

    <main class="flex-1">

      <!-- Page hero -->
      <section class="bg-indigo-50 border-b border-indigo-100 py-16 px-4 text-center">
        <h1 class="text-4xl font-extrabold text-indigo-700 mb-3">Contact Us</h1>
        <p class="text-gray-500 max-w-md mx-auto">
          Have a question or want to see a demo? Drop us a message and we will get back to you within one business day.
        </p>
      </section>

      <!-- Contact form -->
      <section class="max-w-xl mx-auto py-16 px-4">
        <form class="bg-white rounded-2xl shadow-sm p-8 space-y-6" novalidate>

          <div>
            <label for="name" class="block text-sm font-medium text-gray-700 mb-1">Name</label>
            <input
              id="name"
              type="text"
              placeholder="Jane Smith"
              autocomplete="name"
              class="w-full border border-gray-300 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition"
            />
          </div>

          <div>
            <label for="email" class="block text-sm font-medium text-gray-700 mb-1">Email</label>
            <input
              id="email"
              type="email"
              placeholder="jane@example.com"
              autocomplete="email"
              class="w-full border border-gray-300 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition"
            />
          </div>

          <div>
            <label for="subject" class="block text-sm font-medium text-gray-700 mb-1">Subject</label>
            <input
              id="subject"
              type="text"
              placeholder="How can we help?"
              class="w-full border border-gray-300 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition"
            />
          </div>

          <div>
            <label for="message" class="block text-sm font-medium text-gray-700 mb-1">Message</label>
            <textarea
              id="message"
              rows="5"
              placeholder="Tell us a bit more..."
              class="w-full border border-gray-300 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition resize-none"
            ></textarea>
          </div>

          <button
            type="submit"
            class="w-full bg-indigo-600 text-white font-semibold py-3 rounded-full hover:bg-indigo-700 active:bg-indigo-800 transition-colors"
          >
            Send Message
          </button>

        </form>
      </section>

    </main>

    {{> footer}}

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
