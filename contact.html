<!DOCTYPE html>
<html lang="uk" class="light">
  <head>
    {{> head pageTitle="SUPPOINT — Контакти"}}
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body class="bg-background text-on-background font-body-md overflow-x-hidden selection:bg-sunny-accent selection:text-white">

    {{> nav}}

    <main class="flex-1">

      <!-- Page hero -->
      <section class="relative min-h-[400px] flex items-center justify-center pt-32 pb-20 px-margin-mobile overflow-hidden">
        <!-- BG image gradient -->
        <div class="absolute inset-0 z-0 bg-gradient-to-br from-secondary/10 via-secondary/5 to-primary/5"></div>

        <div class="relative z-10 liquid-glass max-w-4xl w-full p-10 md:p-20 rounded-[3rem] text-center flex flex-col items-center gap-10">
          <div class="space-y-6">
            <h1 class="font-headline-lg text-headline-mobile md:text-headline-lg text-primary leading-none" data-i18n="contactUs">
              Зв'яжіться з нами
            </h1>
            <p class="text-body-lg text-on-surface-variant max-w-2xl mx-auto leading-relaxed" data-i18n="contactDesc">
              У вас є запитання або ви хочете побачити демо? Напишіть нам, і ми відповімо протягом робочого дня.
            </p>
          </div>
        </div>
      </section>

      <!-- Contact form -->
      <section class="py-16 px-margin-mobile md:px-margin-desktop max-w-container-max mx-auto max-w-2xl mx-auto">
        <form class="liquid-glass p-10 md:p-14 rounded-[3rem] space-y-8" novalidate>

          <div>
            <label for="name" class="block text-sm font-label-bold text-primary mb-3" data-i18n="name">Ім'я</label>
            <input
              id="name"
              type="text"
              placeholder="Іван Петренко"
              autocomplete="name"
              data-i18n="placeholder:namePlaceholder"
              class="w-full border border-primary/10 rounded-2xl px-6 py-3 text-body-md bg-white/50 focus:outline-none focus:ring-2 focus:ring-secondary/50 focus:border-transparent transition"
            />
          </div>

          <div>
            <label for="email" class="block text-sm font-label-bold text-primary mb-3" data-i18n="email">Email</label>
            <input
              id="email"
              type="email"
              placeholder="ivan@example.com"
              autocomplete="email"
              data-i18n="placeholder:emailPlaceholder"
              class="w-full border border-primary/10 rounded-2xl px-6 py-3 text-body-md bg-white/50 focus:outline-none focus:ring-2 focus:ring-secondary/50 focus:border-transparent transition"
            />
          </div>

          <div>
            <label for="subject" class="block text-sm font-label-bold text-primary mb-3" data-i18n="subject">Тема</label>
            <input
              id="subject"
              type="text"
              placeholder="Як ми можемо допомогти?"
              data-i18n="placeholder:subjectPlaceholder"
              class="w-full border border-primary/10 rounded-2xl px-6 py-3 text-body-md bg-white/50 focus:outline-none focus:ring-2 focus:ring-secondary/50 focus:border-transparent transition"
            />
          </div>

          <div>
            <label for="message" class="block text-sm font-label-bold text-primary mb-3" data-i18n="message">Повідомлення</label>
            <textarea
              id="message"
              rows="6"
              placeholder="Розскажіть нам більше..."
              data-i18n="placeholder:messagePlaceholder"
              class="w-full border border-primary/10 rounded-2xl px-6 py-3 text-body-md bg-white/50 focus:outline-none focus:ring-2 focus:ring-secondary/50 focus:border-transparent transition resize-none"
            ></textarea>
          </div>

          <button
            type="submit"
            class="w-full sunny-btn py-4 text-lg font-label-bold"
            data-i18n="sendMessage"
          >
            Надіслати повідомлення
          </button>

        </form>
      </section>

    </main>

    {{> footer}}

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
